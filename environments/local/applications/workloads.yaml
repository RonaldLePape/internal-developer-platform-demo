apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workloads
  namespace: argocd
spec:
  project: workloads
  source:
    repoURL: https://github.com/RonaldLePape/idp-gitops-demo.git
    targetRevision: main
    path: environments/local/workloads
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true